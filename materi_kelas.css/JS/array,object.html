   <script>
let barang = [
  { nama: "Laptop", harga: 5000000 },

  { nama: "Monitor", harga: 1500000 },

  { nama: "Flashdisk", harga: 100000 },
  { nama: "Harddisk", harga: 800000 },
  { nama: "Headset", harga: 250000 },
  { nama: "Webcam", harga: 400000 },
  { nama: "Speaker", harga: 350000 }
];

let daftarBarang = barang.map((item) => {
  return 
    `<p>
      Nama: ${item.nama} <br>
      Harga: Rp ${item.harga}
    </p>`;
});



document.write(daftarBarang.join(""));
</script>
